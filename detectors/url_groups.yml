version: 1

# Exact locale whitelist (first path segment must match exactly).
locales:
  - en
  - en-eu #en-gb
  - en-in
  - zh-hans
  - zh-hant
  - en-tw
  - zh-hant-tw
  - eng #en-HK
  - cht #zh-hant-HK
  - en-mo
  - zh-hant-mo
  - pt
  - it
  - th
  - vi
  - tl
  - fr
  - id
  - ms
  - ko
  - de
  - ar
  - zh-hans-cn
  - es
  - en-au
  - zh-hans-au
  - zh-hant-au
  - zh-hans-nz
  - en-nz
  - en-sg

# First match wins. These are high-priority buckets.
rules:
  - group: "Home"
    match: "exact"
    value: "/"

  - group: "Robots"
    match: "exact"
    value: "/robots.txt"

  - group: "Sitemaps"
    match: "regex"
    value: "^/sitemap.*\\.xml$"

  - group: "Nuxt Assets"
    match: "prefix"
    value: "/_nuxt/"

  - group: "API"
    match: "prefix"
    value: "/api/"

  - group: "API"
    match: "prefix"
    value: "/getMenuStructure"

  - group: "API"
    match: "prefix"
    value: "/getSubMenuStructure"

  - group: "API"
    match: "prefix"
    value: "/getMenusTranslations"

  - group: "Feeds"
    match: "exact"
    value: "/feed"

  - group: "Feeds"
    match: "exact"
    value: "/rss"

  - group: "Well-Known"
    match: "prefix"
    value: "/.well-known/"

  - group: "Well-Known"
    match: "prefix"
    value: "/autodiscover/"

  # Extension-based assets that still hit origin.
  - group: "Static Assets"
    match: "ext"
    value:
      - css
      - js
      - png
      - jpg
      - jpeg
      - gif
      - webp
      - svg
      - ico
      - woff
      - woff2
      - ttf
      - eot
      - map
      - pdf
      - zip
      - rar
      - 7z
      - mp4
      - webm
      - mp3

# Section mapping after locale detection.
# If path begins with a known locale, section = second segment; else section = first segment.
section_map:
  about: "About"
  academy: "Academy"
  analysis: "Analysis"
  analysis/market-insight: "Analysis - Market Insight"
  analysis/market-news: "Analysis - Market News"
  platform: "Platform"
  trading: "Trading"

fallback_group: "Other Content"
