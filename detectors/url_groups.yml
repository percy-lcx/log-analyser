version: 1

# Exact locale whitelist (first path segment must match exactly).
locales:
  - en
  - en-eu #en-gb
  - en-in
  - zh-hans
  - zh-hant
  - en-tw
  - zh-hant-tw
  - eng #en-HK
  - cht #zh-hant-HK
  - en-mo
  - zh-hant-mo
  - pt
  - it
  - th
  - vi
  - tl
  - fr
  - id
  - ms
  - ko
  - de
  - ar
  - zh-hans-cn
  - es
  - en-au
  - zh-hans-au
  - zh-hant-au
  - zh-hans-nz
  - en-nz
  - en-sg
  - tw
  - au

# First match wins. These are high-priority buckets.
rules:
  - group: "Home"
    match: "exact"
    value: "/"

  - group: "Robots"
    match: "exact"
    value: "/robots.txt"

  - group: "Sitemaps"
    match: "regex"
    value: "^/sitemap.*\\.xml$"

  - group: "Nuxt Assets"
    match: "prefix"
    value: "/_nuxt/"

  - group: "API"
    match: "prefix"
    value: "/api/"

  - group: "API"
    match: "prefix"
    value: "/getMenuStructure"

  - group: "API"
    match: "prefix"
    value: "/getSubMenuStructure"

  - group: "API"
    match: "prefix"
    value: "/getMenusTranslations"

  - group: "Feeds"
    match: "exact"
    value: "/feed"

  - group: "Feeds"
    match: "exact"
    value: "/rss"

  - group: "Well-Known"
    match: "prefix"
    value: "/.well-known/"

  - group: "Well-Known"
    match: "prefix"
    value: "/autodiscover/"

  # Extension-based assets that still hit origin.
  - group: "Static Assets"
    match: "ext"
    value:
      - css
      - js
      - png
      - jpg
      - jpeg
      - gif
      - webp
      - svg
      - ico
      - woff
      - woff2
      - ttf
      - eot
      - map
      - pdf
      - zip
      - rar
      - 7z
      - mp4
      - webm
      - mp3

# Section mapping after locale detection.
# If path begins with a known locale, section = second segment; else section = first segment.
section_map:
  about: "About"
  academy: "Academy"
  analysis: "Analysis"
  analysis/market-insight: "Analysis - Market Insight"
  analysis/market-news: "Analysis - Market News"
  platform: "Platform"
  trading: "Trading"

fallback_group: "Other Content"

# Group assigned to bare locale-root paths like /en, /fr/, /zh-hans, etc.
# These have a known locale but no content section beneath them.
locale_homepage_group: "Locale Homepage"

# Regex matched against the first (and only) path segment of single-segment
# paths whose segment is NOT in the locales whitelist above.  Catches locale
# codes that aren't explicitly listed (e.g. /en-gb, /zh-tw, /ja, /ru) so they
# are classified as Locale Homepage rather than falling back to Other Content.
# Pattern is applied to the bare segment without the leading slash.
#
# Primary tag is an explicit alternation of all 184 ISO 639-1 two-letter codes
# so that generic 2-3-letter words (api, img, css, mcp, bin, php, pms, …) are
# never mistaken for a locale.  The optional suffix parts follow BCP 47:
#   - script  : 4 lowercase letters  (e.g. hans, hant, latn, cyrl)
#   - region  : 2 lowercase letters or 3 digits  (e.g. gb, us, 419)
locale_homepage_pattern: "^(aa|ab|ae|af|ak|am|an|ar|as|av|ay|az|ba|be|bg|bh|bi|bm|bn|bo|br|bs|ca|ce|ch|co|cr|cs|cu|cv|cy|da|de|dv|dz|ee|el|en|eo|es|et|eu|fa|ff|fj|fo|fr|fy|ga|gd|gl|gv|ha|he|hi|ho|hr|ht|hu|hy|hz|ia|id|ie|ig|ii|ik|io|is|it|iu|ja|jv|ka|kg|ki|kj|kk|kl|km|kn|ko|kr|ks|ku|kv|kw|ky|la|lb|lg|li|ln|lo|lt|lu|lv|mg|mh|mi|mk|ml|mn|mr|ms|mt|my|na|nb|nd|ne|ng|nl|nn|no|nr|nv|ny|oc|oj|om|or|os|pa|pi|pl|ps|pt|qu|rm|rn|ro|ru|rw|sa|sc|sd|se|sg|si|sk|sl|sm|sn|so|sq|sr|ss|st|su|sv|sw|ta|te|tg|th|ti|tk|tl|tn|to|tr|ts|tt|tw|ty|ug|uk|ur|uz|va|ve|vi|vo|wa|wo|xh|yi|yo|za|zh|zu)(-[a-z]{4})?(-([a-z]{2}|[0-9]{3}))?$"
