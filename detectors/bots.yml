version: 1
default_family: "Browser/Other"
other_bot_family: "Other bot"
unknown_bot_family: "Unknown bot"

# Matching is done on a lowercased user-agent string.
# First match wins.
rules:
  # Major search engines
  - family: "Googlebot"
    match: "regex"
    pattern: "googlebot"
    category: "Search Engine"
  - family: "AdsBot-Google"
    match: "regex"
    pattern: "adsbot-google|adsbot"
    category: "Search Engine"
  - family: "Google Special Crawlers"
    match: "regex"
    pattern: "googleassociationservice|google-safety|googleproducer|google-inspectiontool|storebot-google|google-site-verification"
    category: "Search Engine"
  - family: "Bingbot"
    match: "regex"
    pattern: "bingbot"
    category: "Search Engine"
  - family: "Applebot"
    match: "regex"
    pattern: "applebot"
    category: "Search Engine"
  - family: "YandexBot"
    match: "regex"
    pattern: "yandex"
    category: "Search Engine"
  - family: "BaiduBot"
    match: "regex"
    pattern: "baidu"
    category: "Search Engine"
  - family: "DuckDuckBot"
    match: "regex"
    pattern: "duckduckbot|duckduckgo"
    category: "Search Engine"
  - family: "Bytespider"
    match: "regex"
    pattern: "bytespider"
    category: "AI Crawler"
  - family: "PetalBot"
    match: "regex"
    pattern: "petalbot"
    category: "Search Engine"

  # AI / LLM crawlers
  - family: "GPTBot"
    match: "regex"
    pattern: "gptbot"
    category: "AI Crawler"
  - family: "ChatGPT-User"
    match: "regex"
    pattern: "chatgpt-user"
    category: "AI Crawler"
  - family: "OAI-SearchBot"
    match: "regex"
    pattern: "oai-searchbot"
    category: "AI Crawler"
  - family: "ClaudeBot"
    match: "regex"
    pattern: "claudebot"
    category: "AI Crawler"
  - family: "PerplexityBot"
    match: "regex"
    pattern: "perplexitybot"
    category: "AI Crawler"

  # SEO tools (from your list)
  - family: "ScreamingFrog"
    match: "regex"
    pattern: "screaming frog|screamingfrog"
    category: "SEO Tool"
  - family: "Ahrefs"
    match: "regex"
    pattern: "ahrefs"
    category: "SEO Tool"
  - family: "Semrush"
    match: "regex"
    pattern: "semrush"
    category: "SEO Tool"
  - family: "Majestic"
    match: "regex"
    pattern: "majestic"
    category: "SEO Tool"
  - family: "Moz"
    match: "regex"
    pattern: "rogerbot|mozbot"
    category: "SEO Tool"
  - family: "Sitebulb"
    match: "regex"
    pattern: "sitebulb"
    category: "SEO Tool"
  - family: "Lumar"
    match: "regex"
    pattern: "deepcrawl|lumar"
    category: "SEO Tool"
  - family: "DataForSEO"
    match: "regex"
    pattern: "dataforseo"
    category: "SEO Tool"
  - family: "Seobility"
    match: "regex"
    pattern: "seobility"
    category: "SEO Tool"
  - family: "Serpstat"
    match: "regex"
    pattern: "serpstat"
    category: "SEO Tool"

  # Additional common SEO tools (new)
  - family: "DotBot"
    match: "regex"
    pattern: "dotbot"
    category: "SEO Tool"
  - family: "SEOkicks"
    match: "regex"
    pattern: "seokicks"
    category: "SEO Tool"
  - family: "Botify"
    match: "regex"
    pattern: "botify"
    category: "SEO Tool"
  - family: "OnCrawl"
    match: "regex"
    pattern: "oncrawl"
    category: "SEO Tool"

  # Monitoring (from your list + additions)
  - family: "UptimeRobot"
    match: "regex"
    pattern: "uptimerobot"
    category: "Uptime Monitor"
  - family: "Pingdom"
    match: "regex"
    pattern: "pingdom"
    category: "Uptime Monitor"
  - family: "StatusCake"
    match: "regex"
    pattern: "statuscake"
    category: "Uptime Monitor"

  # Social previews (from your list + additions)
  - family: "Facebook"
    match: "regex"
    pattern: "facebookexternalhit|facebot"
    category: "Social Media"
  - family: "Twitter"
    match: "regex"
    pattern: "twitterbot"
    category: "Social Media"
  - family: "LinkedIn"
    match: "regex"
    pattern: "linkedinbot"
    category: "Social Media"
  - family: "Pinterest"
    match: "regex"
    pattern: "pinterest"
    category: "Social Media"
  - family: "Slack"
    match: "regex"
    pattern: "slackbot"
    category: "Social Media"
  - family: "Discord"
    match: "regex"
    pattern: "discordbot"
    category: "Social Media"
  - family: "WhatsApp"
    match: "regex"
    pattern: "whatsapp"
    category: "Social Media"

  # Infra / misc crawlers
  - family: "Amazonbot"
    match: "regex"
    pattern: "amazonbot"
    category: "Other"
  - family: "CommonCrawl"
    match: "regex"
    pattern: "ccbot"
    category: "Other"
  - family: "Cloudflare"
    match: "regex"
    pattern: "cloudflare"
    category: "Other"
  - family: "7Siters"
    match: "regex"
    pattern: "7siters"
    category: "Other"
  - family: "Feed Crawler"
    match: "regex"
    pattern: "\\bahc/\\d|feedfetcher|feedparser|rss|feedly|inoreader|newsblur|theoldreader|netvibes|bloglines"
    category: "Feed Reader"
  - family: "Synthetic Monitor"
    match: "regex"
    pattern: "\\bptst/|lighthouse|webpagetest|calibreapp|speedcurve|gtmetrix"
    category: "Uptime Monitor"

  # Security scanners and exploit probes
  - family: "Security Scanner"
    match: "regex"
    pattern: "masscan|zgrab|nuclei|dirbuster|nikto|sqlmap|whatweb|nmap|acunetix|nessus|openvas|wfuzz|gobuster|adobe application manager|python-requests/|go-http-client/|curl/[0-9]"
    category: "Security Scanner"

  # No User-Agent header — nginx/CDN logs these as a bare "-".
  # No real browser or SDK omits the header entirely.
  - family: "Unknown Bot"
    match: "regex"
    pattern: "^-$"
    category: "Other"

  # Fake browser UAs — truncated version numbers (e.g. Chrome/124.0.0 without patch)
  - family: "Fake Browser UA"
    match: "regex"
    pattern: 'chrome/\d+\.0\.0[\s/]|firefox/\d+\.0[\s/]'
    category: "Other"

  # Generic bot bucket (keep last)
  - family: "Other bot"
    match: "regex"
    pattern: "bot|crawler|spider"
    category: "Other"

# Referer-based bot detection.
# Applied only when UA classification returns human.
# Matches against the lowercased referer string. First match wins.
referer_rules:
  - family: "Hotlink Bot"
    pattern: "ventrofx\\.com"
    category: "Other"
